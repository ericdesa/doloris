<div class="app">
  <header class="app__header">
    <div class="app__brand">
      <span class="app__brand-mark">+</span>
      <div>
        <h1>Doloris - Cartographie de la douleur</h1>
        <p>Indiquez sur le modèle 3D où vous avez mal, et décrivez chaque zone.</p>
      </div>
    </div>

    <div class="app__actions">
      <button
        type="button"
        class="app__action"
        [class.app__action--saved]="savedFeedback"
        (click)="save()"
        [title]="savedFeedback ? 'Enregistré !' : 'Enregistrer'"
      >
        @if (savedFeedback) {
          <!-- Checkmark -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        } @else {
          <!-- Floppy disk -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
        }
      </button>

      <button
        type="button"
        class="app__action"
        (click)="openReport()"
        [disabled]="painData.zoneCount() === 0"
        title="Voir le compte-rendu"
      >
        <!-- File-text -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="app__layout">
    <section class="app__column app__column--viewer">
      <app-body-viewer />
    </section>

    <aside class="app__column app__column--zones">
      <app-zone-panel />
    </aside>
  </main>
</div>
