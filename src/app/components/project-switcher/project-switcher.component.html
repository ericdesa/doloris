<div class="ps">
  <button type="button" class="ps__trigger" (click)="toggle()" [class.ps__trigger--open]="isOpen()">
    <!-- folder icon -->
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
    </svg>
    <span class="ps__trigger-label">{{ projectService.currentProject()?.name }}</span>
    <svg class="ps__chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (isOpen()) {
    <div class="ps__dropdown">
      <ul class="ps__list">
        @for (p of projectService.projects(); track p.id) {
          <li class="ps__item" [class.ps__item--active]="p.id === projectService.currentProjectId()">
            @if (renamingId() === p.id) {
              <input
                class="ps__rename-input"
                type="text"
                [value]="renameValue()"
                (input)="renameValue.set($any($event.target).value)"
                (blur)="confirmRename()"
                (keydown)="onRenameKey($event)"
                (click)="$event.stopPropagation()"
                autofocus
              />
            } @else {
              <button type="button" class="ps__item-name" (click)="switchTo(p.id)">
                {{ p.name }}
              </button>
              <button type="button" class="ps__item-action" title="Renommer" (click)="startRename(p.id, p.name, $event)">
                <!-- pencil -->
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button type="button" class="ps__item-action ps__item-action--delete" title="Supprimer" (click)="deleteProject(p.id, $event)">
                <!-- x -->
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            }
          </li>
        }
      </ul>

      <div class="ps__footer">
        @if (isCreating()) {
          <div class="ps__create-row">
            <input
              class="ps__create-input"
              type="text"
              placeholder="Nom du projet…"
              [value]="newName()"
              (input)="newName.set($any($event.target).value)"
              (keydown)="onCreateKey($event)"
              (click)="$event.stopPropagation()"
              autofocus
            />
            <button type="button" class="ps__create-confirm" (click)="confirmCreate()">OK</button>
          </div>
        } @else {
          <button type="button" class="ps__new-btn" (click)="startCreate($event)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nouveau projet
          </button>
        }
      </div>
    </div>
  }
</div>
