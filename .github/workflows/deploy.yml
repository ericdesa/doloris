name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -- --base-href /doloris/
      # SPA fallback: static hosts serve 404.html for unknown paths,
      # which boots Angular and lets the client-side router take over.
      - run: cp dist/doloris/browser/index.html dist/doloris/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/doloris/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
